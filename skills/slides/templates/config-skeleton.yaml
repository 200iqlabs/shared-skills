# slides/config.yaml — per-repo defaults for the `slides` skill
# Generated by /slides:init. Edit values to match this repo's needs.

# Default Marp theme.
# - "default" | "gaia" | "uncover" → Marp built-ins (no custom CSS needed)
# - any other name → looks for <name>.css in themes_dir
default_theme: default

# Default format when brief doesn't specify.
# Options: carousel | carousel-square | talk | workshop
default_format: carousel-square

# Default slide size. Overridden by format-to-size mapping in the skill.
# Examples: "16:9", "4:3", "1:1", "1080x1080"
default_size: 1080x1080

# Identity inserted into footer templates (optional).
author: "{{AUTHOR}}"
footer: "{{FOOTER}}"

# Where custom CSS themes live. Passed to Marp as --theme-set.
themes_dir: slides/themes

# Marp CLI version pin. Use semver range; "^3" tracks 3.x.
# The skill calls `npx --yes @marp-team/marp-cli@<this-value>`.
marp_cli_version: "^3"

# --- OPTIONAL: brand theme generation ---
# Fill in to have /slides:init generate a custom theme CSS from a brand reference doc.
# Leave blank to skip custom theme and rely on Marp built-ins.

# Path (relative to repo root) to the brand reference document.
# Expected to contain color palette and typography tables (see skill docs).
brand_reference: ""

# Target theme filename (without .css). Required when brand_reference is set.
# Example: "brand-dark" → generates slides/themes/brand-dark.css
brand_theme_name: ""
